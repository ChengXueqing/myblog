baseURL = "https://chengxueqing.github.io/myblog/"
languageCode = "zh-cn"
title = "清净心"
theme = "PaperMod"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
copyright = "© 2018-2026 清净心"

# 允许 HTML 原始标签
[markup.goldmark.renderer]
  unsafe = true

# 构建设置
enableGitInfo = false
enableEmoji = true
enableRobotsTXT = true

# 代码高亮（PaperMod 自带样式，无需指定 pygmentsStyle）
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true

# 输出格式（RSS + JSON 用于搜索）
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Sitemap
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# 菜单配置
[[menu.main]]
  identifier = "tech"
  name = "技术积累"
  url = "/tech/"
  weight = 1

[[menu.main]]
  identifier = "ai"
  name = "AI 全栈 ⭐"
  url = "/tech/ai/"
  weight = 2

[[menu.main]]
  identifier = "mind"
  name = "心法修养"
  url = "/mind/"
  weight = 3

[[menu.main]]
  identifier = "life"
  name = "生活记录"
  url = "/life/"
  weight = 4

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 5

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 6

[[menu.main]]
  identifier = "github"
  name = "Github"
  url = "https://github.com/ChengXueqing"
  weight = 10

# PaperMod 主题配置
[params]
  env = "production"
  description = "心静人自静 神清天地归"
  keywords = ["技术", "博客", "前端"]
  author = "ChengXueqing"

  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocSide = "right"
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = true

  # 首页个人信息
  [params.homeInfoParams]
    Title = "清净心"
    Content = "心静人自静，神清天地归"

  # 社交图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ChengXueqing"

# Permalinks
[permalinks]
  tech = "/tech/:slug/"
  frontend = "/tech/frontend/:slug/"
  interview = "/tech/interview/:slug/"
  engineering = "/tech/engineering/:slug/"
  ai = "/tech/ai/:slug/"
  mind = "/mind/:slug/"
  dao = "/mind/dao/:slug/"
  poetry = "/mind/poetry/:slug/"
  reflection = "/mind/reflection/:slug/"
  life = "/life/:slug/"
