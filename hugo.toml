baseURL = "https://chengxueqing.github.io/myblog/"
languageCode = "zh-cn"
title = "清净心"
theme = "PaperMod"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
copyright = "© 2018-2026 清净心"

# 允许 HTML 原始标签
[markup.goldmark.renderer]
  unsafe = true

# 构建设置
enableGitInfo = false
enableEmoji = true
enableRobotsTXT = true

# 代码高亮（PaperMod 自带样式，无需指定 pygmentsStyle）
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true

# 输出格式（RSS + JSON 用于搜索）
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Sitemap
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# 菜单配置
[[menu.main]]
  identifier = "basic"
  name = "前端基础"
  url = "/basic/"
  weight = 1

[[menu.main]]
  identifier = "interview"
  name = "面试题合集"
  url = "/interview/"
  weight = 2

[[menu.main]]
  identifier = "advanced"
  name = "静以修身"
  url = "/advanced/"
  weight = 3

[[menu.main]]
  identifier = "others"
  name = "诗和远方"
  url = "/others/"
  weight = 4

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 5

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 6

[[menu.main]]
  identifier = "github"
  name = "Github"
  url = "https://github.com/ChengXueqing"
  weight = 10

# PaperMod 主题配置
[params]
  env = "production"
  description = "心静人自静 神清天地归"
  keywords = ["技术", "博客", "前端"]
  author = "ChengXueqing"

  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocSide = "right"
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = true

  # 首页个人信息
  [params.homeInfoParams]
    Title = "清净心"
    Content = "心静人自静，神清天地归"

  # 社交图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ChengXueqing"

# Permalinks（语义化文件名，slug = 去掉扩展名的文件名）
[permalinks]
  basic = "/basic/:slug/"
  advanced = "/advanced/:slug/"
  interview = "/interview/:slug/"
  others = "/others/:slug/"
  engineering = "/engineering/:slug/"
